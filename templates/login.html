<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUND MANAGER — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #080c10;
  color: #c8d8e8;
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #0d1118;
  border: 1px solid #1e2d3d;
  border-radius: 8px;
  padding: 48px 40px;
  width: 360px;
  text-align: center;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 3px;
  color: #00d4ff;
  margin-bottom: 6px;
}
.logo span { color: #c8d8e8; }
.subtitle {
  font-size: 10px;
  letter-spacing: 2px;
  color: #4a6070;
  text-transform: uppercase;
  margin-bottom: 36px;
}
.form-label {
  display: block;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #4a6070;
  margin-bottom: 8px;
  text-align: left;
}
.form-input {
  width: 100%;
  background: #111820;
  border: 1px solid #1e2d3d;
  border-radius: 4px;
  padding: 12px 14px;
  color: #c8d8e8;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 20px;
}
.form-input:focus { border-color: #00d4ff; }
.btn {
  width: 100%;
  background: #00d4ff;
  color: #000;
  border: none;
  border-radius: 4px;
  padding: 12px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #00b8d9; }
.error {
  background: rgba(255,69,96,0.1);
  border: 1px solid rgba(255,69,96,0.3);
  color: #ff4560;
  padding: 10px;
  border-radius: 4px;
  font-size: 12px;
  margin-bottom: 20px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">FUND<span>MGR</span></div>
  <div class="subtitle">Portfolio Intelligence</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/login">
    <label class="form-label">Password</label>
    <input type="password" name="password" class="form-input" placeholder="Enter password" autofocus>
    <button type="submit" class="btn">→ Access Portfolio</button>
  </form>
</div>
</body>
</html>
